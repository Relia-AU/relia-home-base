name: Deploy Notify

on:
  deployment_status:

jobs:
  notify:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        run: |
          curl -X POST -H 'content-type: application/json' \
            --data "{
              \"text\": \"Production deploy complete\",
              \"blocks\": [
                {\"type\": \"header\", \"text\": {\"type\": \"plain_text\", \"text\": \"Production deploy\"}},
                {\"type\": \"section\", \"fields\": [
                  {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\n<${{ github.event.deployment.payload.web_url || github.event.deployment_status.target_url }}|${GITHUB_SHA:0:7}>\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Author:*\n${{ github.event.deployment.creator.login }}\"}
                ]}
              ]
            }" \
            ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
