name = "relia-cron"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 17 * * *"]  # 03:00 AEST daily

[vars]
ENVIRONMENT = "production"

# Secrets set via: wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# - SUPABASE_URL
# - SUPABASE_SERVICE_ROLE_KEY
# - SLACK_WEBHOOK_ENG
